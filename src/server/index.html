<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Graph+</title>
  <link rel="stylesheet" href="/codicon.css" />
  <link rel="stylesheet" href="/main.css" />
  <style>
    /* Best-effort mapping of the VS Code default dark theme onto the
       --vscode-* CSS variables the webview reads. The webview already ships
       fallbacks, so partial coverage is fine; this just makes standalone mode
       look like the editor's Dark Modern theme. */
    :root {
      color-scheme: dark;
      --vscode-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Ubuntu", "Droid Sans", sans-serif;
      --vscode-font-size: 13px;
      --vscode-editor-font-family: "Droid Sans Mono", "monospace", monospace;

      --vscode-foreground: #cccccc;
      --vscode-descriptionForeground: #9d9d9d;
      --vscode-disabledForeground: #5a5a5a;
      --vscode-errorForeground: #f48771;
      --vscode-focusBorder: #0078d4;
      --vscode-contrastBorder: transparent;
      --vscode-widget-border: #303031;
      --vscode-widget-shadow: rgba(0, 0, 0, 0.36);

      --vscode-editor-background: #1f1f1f;
      --vscode-editor-foreground: #cccccc;
      --vscode-sideBar-background: #181818;
      --vscode-sideBar-foreground: #cccccc;
      --vscode-sideBarSectionHeader-background: #181818;
      --vscode-panel-background: #181818;
      --vscode-panel-border: #2b2b2b;

      --vscode-toolbar-hoverBackground: #2a2d2e;
      --vscode-list-hoverBackground: #2a2d2e;
      --vscode-list-activeSelectionBackground: #04395e;
      --vscode-list-activeSelectionForeground: #ffffff;
      --vscode-list-inactiveSelectionBackground: #37373d;
      --vscode-list-focusOutline: #0078d4;

      --vscode-input-background: #313131;
      --vscode-input-foreground: #cccccc;
      --vscode-input-border: #3c3c3c;
      --vscode-input-placeholderForeground: #989898;
      --vscode-inputOption-activeBorder: #0078d4;
      --vscode-dropdown-background: #313131;
      --vscode-dropdown-foreground: #cccccc;
      --vscode-dropdown-border: #3c3c3c;

      --vscode-button-background: #0078d4;
      --vscode-button-foreground: #ffffff;
      --vscode-button-hoverBackground: #026ec1;
      --vscode-button-secondaryBackground: #313131;
      --vscode-button-secondaryForeground: #cccccc;
      --vscode-button-secondaryHoverBackground: #3c3c3c;

      --vscode-badge-background: #616161;
      --vscode-badge-foreground: #f8f8f8;
      --vscode-textLink-foreground: #4daafc;
      --vscode-textLink-activeForeground: #4daafc;

      --vscode-scrollbarSlider-background: rgba(121, 121, 121, 0.4);
      --vscode-scrollbarSlider-hoverBackground: rgba(100, 100, 100, 0.7);
      --vscode-scrollbarSlider-activeBackground: rgba(191, 191, 191, 0.4);

      --vscode-gitDecoration-modifiedResourceForeground: #e2c08d;
      --vscode-gitDecoration-deletedResourceForeground: #c74e39;
      --vscode-gitDecoration-untrackedResourceForeground: #73c991;
      --vscode-gitDecoration-addedResourceForeground: #81b88b;
      --vscode-gitDecoration-renamedResourceForeground: #73c991;
      --vscode-gitDecoration-conflictingResourceForeground: #e4676b;

      --vscode-diffEditor-insertedTextBackground: rgba(155, 185, 85, 0.2);
      --vscode-diffEditor-removedTextBackground: rgba(255, 0, 0, 0.2);
      --vscode-diffEditor-insertedLineBackground: rgba(155, 185, 85, 0.14);
      --vscode-diffEditor-removedLineBackground: rgba(255, 0, 0, 0.14);

      --vscode-charts-red: #f14c4c;
      --vscode-charts-green: #73c991;
      --vscode-charts-blue: #3794ff;
      --vscode-charts-orange: #d18616;
      --vscode-charts-yellow: #ffcc00;
      --vscode-charts-purple: #b180d7;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--vscode-editor-background);
      color: var(--vscode-foreground);
      font-family: var(--vscode-font-family);
      font-size: var(--vscode-font-size);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/main.js"></script>
</body>
</html>
